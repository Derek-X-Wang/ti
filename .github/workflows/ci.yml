name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# One run per ref; cancel superseded runs so the queue stays short.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: check
    # macOS so CI mirrors the product target — PTY and TCC semantics are
    # macOS-specific. Swift/Inspector checks get added here when those slices land.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable + rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Build
        run: cargo build --workspace --all-targets
